name: backend-deploy
on:
  push:
    branches: [main]
    paths: ["backend/**", ".github/workflows/backend-deploy.yml"]
  workflow_dispatch:

# One deploy at a time; never cancel a deploy already mutating CT112.
concurrency:
  group: backend-deploy
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/jeongeup-lab/pictrip-backend

jobs:
  # Gate the image on the same suite backend-ci runs on PRs — a green main can
  # still regress on merge, so re-run before building the artifact we ship.
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        # Must match app/config.py defaults so the default URL resolves; pytest
        # and alembic only override POSTGRES_DB.
        env:
          POSTGRES_DB: pictrip_test
          POSTGRES_USER: pictrip
          POSTGRES_PASSWORD: pictrip_dev_only
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app
      - run: uv run alembic upgrade head
        env:
          POSTGRES_DB: pictrip_test
      - run: uv run pytest
        env:
          POSTGRES_DB: pictrip_test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Tag with the full commit SHA (deploy.sh pins IMAGE_TAG=$GITHUB_SHA) plus
      # latest (the .deploy.env default). GHA cache keeps CLIP weights + uv
      # layers from re-downloading every push.
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    needs: build-and-push
    runs-on: [self-hosted, ct112]
    steps:
      - uses: actions/checkout@v4
      # deploy.sh: pin tag -> compose pull -> up -d (entrypoint runs
      # `alembic upgrade head`) -> local+public smoke -> rollback on fail.
      - run: ./deploy/api-host/deploy.sh "${{ github.sha }}"
