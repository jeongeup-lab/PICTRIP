name: weekly-deep-check
on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:
jobs:
  deep-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Admin static ↔ mockups drift check
        run: bash .github/scripts/check-admin-mockup-drift.sh
      # TODO: more weekly maintenance — dependency audit, slow tests,
      # api-types vs core/schemas drift.
