name: pipeline-ci
on:
  pull_request:
    paths: ["pipeline/**", ".github/workflows/pipeline-ci.yml"]
defaults:
  run:
    working-directory: pipeline
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
