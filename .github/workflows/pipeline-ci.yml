name: pipeline-ci
on:
  pull_request:
    paths: ["pipeline/**", ".github/workflows/pipeline-ci.yml"]
defaults:
  run:
    working-directory: pipeline
jobs:
  check:
    runs-on: ubuntu-latest
    services:
      # DB-integration tests self-bootstrap their schema (tests/conftest.py),
      # so an empty Postgres is enough — no backend Alembic dependency.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: pictrip
          POSTGRES_PASSWORD: pictrip_dev_only
          POSTGRES_DB: pictrip_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pictrip"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
        env:
          TEST_DATABASE_URL: postgresql://pictrip:pictrip_dev_only@localhost:5432/pictrip_test
