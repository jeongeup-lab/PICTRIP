<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PicTrip Admin · 로그인</title>
<link rel="stylesheet" href="/admin/assets/admin.css" />
</head>
<body>
<div class="login-wrap">
  <form class="login-card" method="post" action="/admin/login">
    <div class="brand">
      <div class="logo"><img src="/admin/assets/logo.png" alt="PicTrip" /></div>
      <div class="name">PicTrip</div>
    </div>
    <h1>관리자 로그인</h1>
    <p class="sub">운영 콘솔에 접속하려면 로그인하세요.</p>
    <div class="login-error" id="login-error" style="display:none">아이디 또는 비밀번호가 올바르지 않습니다.</div>
    <div class="login-field">
      <label for="username">아이디</label>
      <input class="login-input" id="username" name="username" autocomplete="username" required autofocus />
    </div>
    <div class="login-field">
      <label for="password">비밀번호</label>
      <input class="login-input" id="password" name="password" type="password" autocomplete="current-password" required />
    </div>
    <button class="btn login-btn" type="submit">로그인</button>
  </form>
</div>
<script src="/admin/assets/login.js"></script>
</body>
</html>
