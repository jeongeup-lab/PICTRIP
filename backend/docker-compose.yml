# Local dev compose. Production runtime compose lives in deploy/api-host/.
services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on: [db, redis]
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pictrip
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7-alpine
    command: >-
      redis-server --appendonly yes --appendfsync everysec
      --save 60 1 --maxmemory 256mb --maxmemory-policy noeviction
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]
volumes:
  pgdata:
  redisdata:
