<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PicTrip · 사진 선택</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #FFFFFF;
    --inset: #F7F7F8;
    --ink: #171719;
    --sec: #5A5C63;
    --ter: #9396A0;
    --line: rgba(112, 115, 124, 0.18);
    --fill: rgba(112, 115, 124, 0.08);
    --rose: #E0507E;
    --rose-end: #F2849E;
    --control: rgba(23, 23, 25, 0.34);
    --pretendard: 'Pretendard', -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--pretendard); background: #e6e7ea; display: flex; justify-content: center; padding: 40px 16px; color: var(--ink); }
  .phone { width: 402px; height: 874px; background: var(--bg); border-radius: 46px; box-shadow: 0 30px 80px rgba(20,18,22,0.28); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .statusbar { height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 8px; font-size: 15px; font-weight: 600; }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .topRow { height: 44px; display: flex; align-items: center; padding: 0 12px; }
  .backBtn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

  .body { flex: 1; display: flex; flex-direction: column; padding: 6px 24px 18px; }
  .title { font-size: 25px; font-weight: 700; letter-spacing: -0.55px; line-height: 32px; }
  .sub { color: var(--sec); font-size: 14px; margin-top: 8px; }

  /* 프리뷰 (선택됨) */
  .preview { flex: 1; margin: 22px 0 16px; border-radius: 20px; overflow: hidden; background: var(--inset); position: relative; }
  .preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .remove { position: absolute; top: 12px; right: 12px; width: 34px; height: 34px; border-radius: 17px; background: var(--control); display: flex; align-items: center; justify-content: center; color: #fff; }

  /* 입력 버튼 행 */
  .actions { display: flex; gap: 11px; margin-bottom: 11px; }
  .btn { flex: 1; height: 54px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 15px; font-weight: 700; }
  .btn.secondary { background: var(--inset); color: var(--ink); }
  .cta { height: 56px; border-radius: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 16px; font-weight: 700; color: #fff; background: var(--ink); box-shadow: 0 14px 28px rgba(23,23,25,0.20); }
</style>
</head>
<body>
  <div class="phone">
    <div class="statusbar">
      <span>9:41</span>
      <span class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="3" width="2.5" height="6" rx="1"/><rect x="4" y="1.5" width="2.5" height="7.5" rx="1"/><rect x="8" y="0" width="2.5" height="9" rx="1"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1.5" width="19" height="9" rx="2.5"/><rect x="2.5" y="3" width="14" height="6" rx="1" fill="currentColor"/><rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
      </span>
    </div>
    <div class="topRow">
      <div class="backBtn">
        <svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
      </div>
    </div>

    <div class="body">
      <div class="title">사진 속 분위기로<br />여행지를 찾아요</div>
      <div class="sub">마음에 드는 사진 한 장이면 충분해요.</div>

      <div class="preview">
        <img src="https://picsum.photos/seed/mood-photo/760/900" alt="" />
        <div class="remove">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        </div>
      </div>

      <div class="actions">
        <div class="btn secondary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8h3l1.5-2.2h7L17 8h3a1 1 0 0 1 1 1v9a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13" r="3.5"/></svg>
          촬영
        </div>
        <div class="btn secondary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.8"/><path d="M21 15l-5-5L5 21"/></svg>
          갤러리
        </div>
      </div>

      <div class="cta">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l1.8 4.9L18.7 8 13.8 9.8 12 14.7 10.2 9.8 5.3 8l4.9-1.1z"/><path d="M19 14l.9 2.4 2.4.9-2.4.9-.9 2.4-.9-2.4-2.4-.9 2.4-.9z"/></svg>
        분석하기
      </div>
    </div>
  </div>
</body>
</html>
