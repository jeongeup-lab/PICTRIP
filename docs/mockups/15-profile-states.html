<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PicTrip · 마이 (상태)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #FFFFFF; --inset: #F7F7F8; --ink: #171719; --sec: #5A5C63; --ter: #9396A0;
    --line: rgba(112,115,124,0.18); --fill: rgba(112,115,124,0.08);
    --p: 'Pretendard', -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--p); background: #e4e5e8; display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; padding: 44px 24px; color: var(--ink); }
  .variant { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .vlabel { font-size: 15px; font-weight: 800; }
  .phone { width: 392px; height: 812px; background: var(--inset); border-radius: 46px; box-shadow: 0 24px 64px rgba(16,14,18,0.26); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .statusbar { background: var(--bg); height: 50px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 7px; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .navbar { background: var(--bg); height: 50px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .navbar .title { font-size: 17px; font-weight: 700; }
  .scroll { flex: 1; overflow-y: auto; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }

  .profile { display: flex; align-items: center; gap: 14px; padding: 20px; background: var(--bg); }
  .avatar { width: 62px; height: 62px; border-radius: 31px; overflow: hidden; background: var(--fill); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .pname { font-size: 19px; font-weight: 700; letter-spacing: -0.19px; }
  .pemail { color: var(--sec); font-size: 13.5px; margin-top: 3px; }

  .sep { height: 9px; background: var(--inset); }

  .secHead { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px 11px; background: var(--bg); }
  .secTitle { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }

  /* 빈 스크랩 보드 */
  .railEmpty { margin: 0 20px 18px; border: 1px solid var(--line); border-radius: 14px; padding: 30px 16px; display: flex; flex-direction: column; align-items: center; gap: 14px; background: var(--bg); }
  .railEmptyText { color: var(--ter); font-size: 14px; font-weight: 500; }
  .railEmptyBtn { display: flex; align-items: center; gap: 6px; height: 38px; padding: 0 18px; border-radius: 999px; background: var(--fill); color: var(--ink); font-size: 13.5px; font-weight: 700; }
  /* 스크랩 섹션 흰 배경 유지를 위한 래퍼 */
  .scrapWrap { background: var(--bg); padding-bottom: 2px; }

  .group { background: var(--bg); }
  .row { display: flex; align-items: center; gap: 13px; padding: 16px 20px; border-top: 1px solid var(--line); }
  .row.first { border-top: 0; }
  .rowIcon { width: 21px; display: flex; align-items: center; justify-content: center; color: var(--sec); }
  .rowLabel { flex: 1; font-size: 15.5px; font-weight: 600; }
  .rowValue { color: var(--ter); font-size: 14px; font-variant-numeric: tabular-nums; }
  .rowChev { color: var(--ter); display: flex; }

  /* 게스트 로그인 행 */
  .loginRow { display: flex; align-items: center; gap: 14px; padding: 22px 20px; background: var(--bg); }
  .loginAvatar { width: 54px; height: 54px; border-radius: 27px; background: var(--fill); display: flex; align-items: center; justify-content: center; color: var(--ink); flex-shrink: 0; }
  .loginTitle { font-size: 18px; font-weight: 700; letter-spacing: -0.18px; }
  .loginSub { color: var(--sec); font-size: 13px; margin-top: 3px; }
  .loginChev { color: var(--ter); display: flex; margin-left: auto; }

  .foot { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 24px 0 30px; }
  .footLink { color: var(--sec); font-size: 13px; font-weight: 600; }
  .footDiv { width: 1px; height: 12px; background: var(--line); }

  .tabbar { height: 86px; padding: 12px 14px 0; background: #fff; border-top: 1px solid var(--line); display: flex; justify-content: space-around; flex-shrink: 0; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .tab .tlabel { font-size: 12px; font-weight: 600; }
  .tab.active, .tab.active .tlabel { color: var(--ink); }
  .tab:not(.active), .tab:not(.active) .tlabel { color: var(--ter); }

  /* 게스트 가운데 안내 */
  .guestScroll { background: var(--bg); }
  .guestHero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 0 40px; gap: 0; }
  .guestIcon { width: 84px; height: 84px; border-radius: 42px; background: var(--inset); display: flex; align-items: center; justify-content: center; color: var(--ter); margin-bottom: 22px; }
  .guestTitle { font-size: 21px; font-weight: 800; letter-spacing: -0.4px; }
  .guestSub { color: var(--sec); font-size: 14px; line-height: 22px; margin-top: 10px; }
  .guestBtn { margin-top: 28px; height: 52px; width: 100%; border-radius: 14px; background: var(--ink); color: #fff; font-size: 16px; font-weight: 800; display: flex; align-items: center; justify-content: center; }
  .guestFoot { display: flex; justify-content: center; padding: 0 0 30px; }
</style>
</head>
