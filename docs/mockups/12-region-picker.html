<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PicTrip · 지역 선택</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #FFFFFF; --inset: #F7F7F8; --ink: #171719; --sec: #5A5C63; --ter: #9396A0;
    --line: rgba(112,115,124,0.18); --hair: rgba(112,115,124,0.14);
    --dim: rgba(20,20,25,0.34);
    --map: #EBECEF; --road: #FFFFFF; --water: rgba(120,160,200,0.18); --park: rgba(120,180,140,0.18);
    --user: #2D7DF6;
    --p: 'Pretendard', -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--p); background: #e4e5e8; display: flex; justify-content: center; padding: 40px 16px; color: var(--ink); }
  .phone { width: 402px; height: 874px; background: var(--bg); border-radius: 46px; box-shadow: 0 30px 80px rgba(16,14,18,0.28); overflow: hidden; position: relative; }

  /* ── 뒤 지도 화면(그대로) ── */
  .map { position: absolute; inset: 0; background: var(--map); overflow: hidden; }
  .map .roads { position: absolute; inset: -20%; background:
      repeating-linear-gradient(0deg, transparent 0 78px, var(--road) 78px 86px),
      repeating-linear-gradient(90deg, transparent 0 92px, var(--road) 92px 100px); opacity: 0.9; }
  .map .road-diag { position: absolute; left: -10%; right: -10%; top: 24%; height: 22px; background: var(--road); transform: rotate(-13deg); }
  .map .water { position: absolute; width: 280px; height: 220px; border-radius: 48% 52% 60% 40%; background: var(--water); top: -60px; right: -70px; }
  .map .park { position: absolute; width: 180px; height: 150px; border-radius: 46% 54% 50% 50%; background: var(--park); top: 150px; left: -40px; }
  .pin { position: absolute; transform: translate(-50%, -100%); filter: drop-shadow(0 3px 5px rgba(16,14,18,0.25)); }
  .userdot { position: absolute; transform: translate(-50%, -50%); }
  .userdot .halo { position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 54px; height: 54px; border-radius: 50%; background: rgba(45,125,246,0.16); }
  .userdot .dot { position: relative; width: 18px; height: 18px; border-radius: 50%; background: var(--user); border: 3px solid #fff; box-shadow: 0 2px 6px rgba(45,125,246,0.5); }

  /* 상단 헤더(그대로) */
  .header { position: absolute; top: 0; left: 0; right: 0; z-index: 10; background: #fff; padding-top: 14px; box-shadow: 0 1px 0 var(--line); }
  .statusbar { display: flex; align-items: center; justify-content: space-between; padding: 0 28px; font-size: 15px; font-weight: 600; height: 24px; }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .lochead { display: flex; align-items: baseline; gap: 8px; padding: 12px 22px 14px; }
  .lochead .now { color: var(--ter); font-size: 13px; font-weight: 600; }
  .lochead .place { color: var(--ink); font-size: 21px; font-weight: 800; letter-spacing: -0.3px; }
  .lochead .chev { color: var(--ter); display: flex; align-self: baseline; margin-left: -2px; transform: translateY(2px); }

  /* dim — 지도/헤더 위로 (반투명이라 그대로 비침) */
  .dim { position: absolute; inset: 0; z-index: 20; background: var(--dim); }

  /* ── 시트 ── */
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; z-index: 30; height: 62%; background: var(--bg); border-radius: 22px 22px 0 0; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 -8px 28px rgba(16,14,18,0.18); }
  .shead { height: 62px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid var(--hair); position: relative; }
  .shead .x { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--ter); display: flex; }
  .shead .title { font-size: 18px; font-weight: 800; }

  .sbody { flex: 1; display: flex; min-height: 0; }
  .left { width: 33%; background: var(--inset); border-right: 1px solid var(--hair); overflow-y: auto; scrollbar-width: none; }
  .left::-webkit-scrollbar { display: none; }
  .grow { display: flex; align-items: center; justify-content: space-between; padding: 19px 20px; }
  .grow .t { font-size: 17px; font-weight: 600; color: var(--ter); }
  .grow.on { background: var(--bg); }
  .grow.on .t { color: var(--ink); font-weight: 800; }
  .grow.on .c { color: var(--ink); display: flex; }

  .right { flex: 1; overflow-y: auto; scrollbar-width: none; }
  .right::-webkit-scrollbar { display: none; }
  .areahead { padding: 19px 22px; }
  .areahead .t { font-size: 18px; font-weight: 800; color: var(--ink); }
  .arearow { padding: 18px 22px; border-top: 1px solid var(--hair); }
  .arearow .t { font-size: 16px; font-weight: 500; color: var(--ter); }
  .arearow.on .t { color: var(--ink); font-weight: 800; }

  .cta { padding: 12px 18px 26px; }
  .ctabtn { height: 56px; border-radius: 14px; background: var(--ink); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 17px; font-weight: 800; }
</style>
</head>
<body>
  <div class="phone">
    <!-- 뒤 지도 -->
    <div class="map">
      <div class="roads"></div>
      <div class="road-diag"></div>
      <div class="water"></div>
      <div class="park"></div>
      <div class="pin" style="left:30%; top:34%"><svg width="30" height="30" viewBox="0 0 24 24" fill="#171719" stroke="#fff" stroke-width="1.4"><path d="M12 22s7-6.5 7-11a7 7 0 1 0-14 0c0 4.5 7 11 7 11z"/><circle cx="12" cy="11" r="2.4" fill="#fff" stroke="none"/></svg></div>
      <div class="pin" style="left:62%; top:30%"><svg width="26" height="26" viewBox="0 0 24 24" fill="#171719" stroke="#fff" stroke-width="1.4"><path d="M12 22s7-6.5 7-11a7 7 0 1 0-14 0c0 4.5 7 11 7 11z"/><circle cx="12" cy="11" r="2.4" fill="#fff" stroke="none"/></svg></div>
      <div class="pin" style="left:44%; top:43%"><svg width="30" height="30" viewBox="0 0 24 24" fill="#171719" stroke="#fff" stroke-width="1.4"><path d="M12 22s7-6.5 7-11a7 7 0 1 0-14 0c0 4.5 7 11 7 11z"/><circle cx="12" cy="11" r="2.4" fill="#fff" stroke="none"/></svg></div>
      <div class="userdot" style="left:50%; top:38%"><div class="halo"></div><div class="dot"></div></div>
    </div>

    <!-- 상단 헤더(그대로) -->
    <div class="header">
      <div class="statusbar"><span>9:41</span><span class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="3" width="2.5" height="6" rx="1"/><rect x="4" y="1.5" width="2.5" height="7.5" rx="1"/><rect x="8" y="0" width="2.5" height="9" rx="1"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1.5" width="19" height="9" rx="2.5"/><rect x="2.5" y="3" width="14" height="6" rx="1" fill="currentColor"/><rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
      </span></div>
      <div class="lochead">
        <span class="now">현위치</span>
        <span class="place">한림읍</span>
        <span class="chev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></span>
      </div>
    </div>

    <!-- dim -->
    <div class="dim"></div>

    <!-- 시트 -->
    <div class="sheet">
      <div class="shead">
        <div class="x"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg></div>
        <div class="title">지역 선택</div>
      </div>

      <div class="sbody">
        <div class="left">
          <div class="grow on"><span class="t">서울</span><span class="c"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></div>
          <div class="grow"><span class="t">부산</span></div>
          <div class="grow"><span class="t">대구</span></div>
          <div class="grow"><span class="t">인천</span></div>
          <div class="grow"><span class="t">광주</span></div>
          <div class="grow"><span class="t">대전</span></div>
          <div class="grow"><span class="t">울산</span></div>
          <div class="grow"><span class="t">세종</span></div>
          <div class="grow"><span class="t">경기</span></div>
          <div class="grow"><span class="t">강원</span></div>
          <div class="grow"><span class="t">충북</span></div>
          <div class="grow"><span class="t">제주</span></div>
        </div>

        <div class="right">
          <div class="areahead"><span class="t">서울 전체</span></div>
          <div class="arearow on"><span class="t">강남구</span></div>
          <div class="arearow"><span class="t">중구</span></div>
          <div class="arearow"><span class="t">종로구</span></div>
          <div class="arearow"><span class="t">송파구</span></div>
          <div class="arearow"><span class="t">마포구</span></div>
          <div class="arearow"><span class="t">용산구</span></div>
          <div class="arearow"><span class="t">영등포구</span></div>
          <div class="arearow"><span class="t">서초구</span></div>
        </div>
      </div>

      <div class="cta"><div class="ctabtn">검색</div></div>
    </div>
  </div>
</body>
</html>
