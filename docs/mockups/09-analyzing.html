<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PicTrip · 분석중</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #FFFFFF; --inset: #F7F7F8; --ink: #171719; --sec: #5A5C63; --ter: #9396A0;
    --line: rgba(112,115,124,0.18); --skeleton: #ECEDEF;
    --pretendard: 'Pretendard', -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--pretendard); background: #e6e7ea; display: flex; justify-content: center; padding: 40px 16px; color: var(--ink); }
  .phone { width: 402px; height: 874px; background: var(--bg); border-radius: 46px; box-shadow: 0 30px 80px rgba(20,18,22,0.28); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .statusbar { height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 8px; font-size: 15px; font-weight: 600; flex-shrink: 0; }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .topRow { height: 44px; display: flex; align-items: center; padding: 0 12px; flex-shrink: 0; }
  .backBtn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; }

  @keyframes indet { 0% { left: -42%; } 100% { left: 100%; } }

  .wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 44px; }
  .thumb { width: 92px; height: 92px; border-radius: 20px; overflow: hidden; background: var(--inset); box-shadow: 0 10px 24px rgba(23,23,25,0.12); margin-bottom: 26px; }
  .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .title { font-size: 20px; font-weight: 700; letter-spacing: -0.36px; margin-bottom: 6px; }
  .sub { font-size: 13px; color: var(--sec); margin-bottom: 30px; }
  .bar { width: 100%; height: 4px; border-radius: 2px; background: var(--skeleton); overflow: hidden; position: relative; }
  .bar i { position: absolute; top: 0; width: 42%; height: 100%; border-radius: 2px; background: var(--ink); animation: indet 1.3s ease-in-out infinite; }
</style>
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span class="icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="3" width="2.5" height="6" rx="1"/><rect x="4" y="1.5" width="2.5" height="7.5" rx="1"/><rect x="8" y="0" width="2.5" height="9" rx="1"/></svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1.5" width="19" height="9" rx="2.5"/><rect x="2.5" y="3" width="14" height="6" rx="1" fill="currentColor"/><rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
    </span></div>
    <div class="topRow"><div class="backBtn"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></div></div>

    <div class="wrap">
      <div class="thumb"><img src="https://picsum.photos/seed/mood-photo/200/200" alt="" /></div>
      <div class="title">사진을 분석하고 있어요</div>
      <div class="sub">잠시만 기다려 주세요</div>
      <div class="bar"><i></i></div>
    </div>
  </div>
</body>
</html>
