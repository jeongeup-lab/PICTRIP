<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PicTrip · 약관·정책</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #FFFFFF; --inset: #F7F7F8; --ink: #171719; --sec: #5A5C63; --ter: #9396A0;
    --line: rgba(112,115,124,0.18); --fill: rgba(112,115,124,0.08);
    --p: 'Pretendard', -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--p); background: #e4e5e8; display: flex; flex-wrap: wrap; gap: 40px; justify-content: center; padding: 44px 24px; color: var(--ink); }
  .variant { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .vlabel { font-size: 15px; font-weight: 800; }
  .phone { width: 392px; height: 812px; background: var(--bg); border-radius: 46px; box-shadow: 0 24px 64px rgba(16,14,18,0.26); overflow: hidden; position: relative; display: flex; flex-direction: column; }
  .statusbar { height: 52px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 7px; font-size: 14px; font-weight: 600; flex-shrink: 0; }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .navbar { height: 50px; display: flex; align-items: center; padding: 0 8px; flex-shrink: 0; border-bottom: 1px solid var(--line); position: relative; }
  .navbar .nbtn { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; color: var(--ink); }
  .navbar .title { position: absolute; left: 0; right: 0; text-align: center; font-size: 17px; font-weight: 700; pointer-events: none; }
  .scroll { flex: 1; overflow-y: auto; scrollbar-width: none; }
  .scroll::-webkit-scrollbar { display: none; }

  /* 목록 */
  .group { background: var(--bg); margin-top: 8px; }
  .row { display: flex; align-items: center; padding: 17px 20px; border-bottom: 1px solid var(--line); }
  .rowLabel { flex: 1; font-size: 15.5px; font-weight: 600; }
  .rowVal { color: var(--ter); font-size: 14px; font-variant-numeric: tabular-nums; }
  .rowChev { color: var(--ter); display: flex; }

  /* 상세 */
  .doc { padding: 24px 22px 40px; }
  .docH { font-size: 20px; font-weight: 800; letter-spacing: -0.3px; margin-bottom: 6px; }
  .docMeta { font-size: 12.5px; color: var(--ter); margin-bottom: 20px; }
  .docP { font-size: 14.5px; line-height: 24px; color: var(--sec); margin-bottom: 16px; }
  .docCallout { background: var(--inset); border-radius: 12px; padding: 16px; font-size: 13.5px; line-height: 22px; color: var(--ink); font-weight: 600; margin: 4px 0 18px; }
  .docCallout span { display: block; color: var(--ter); font-weight: 600; font-size: 11.5px; letter-spacing: 0.4px; margin-bottom: 6px; }
  .docH3 { font-size: 15px; font-weight: 800; margin: 6px 0 8px; }
</style>
</head>
<body>

  <!-- ════ 목록 ════ -->
  <div class="variant">
    <div class="vlabel">약관·정책</div>
    <div class="phone">
      <div class="statusbar"><span>9:41</span><span class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="3" width="2.5" height="6" rx="1"/><rect x="4" y="1.5" width="2.5" height="7.5" rx="1"/><rect x="8" y="0" width="2.5" height="9" rx="1"/></svg>
        <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1.5" width="19" height="9" rx="2.5"/><rect x="2.5" y="3" width="14" height="6" rx="1" fill="currentColor"/><rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
      </span></div>
      <div class="navbar"><div class="nbtn"><svg width="23" height="23" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></div><div class="title">약관·정책</div></div>
      <div class="scroll">
        <div class="group">
          <div class="row"><span class="rowLabel">이용약관</span><span class="rowChev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></div>
          <div class="row"><span class="rowLabel">개인정보처리방침</span><span class="rowChev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></div>
          <div class="row"><span class="rowLabel">위치기반서비스 이용약관</span><span class="rowChev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></div>
          <div class="row"><span class="rowLabel">데이터 출처</span><span class="rowChev"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 6l6 6-6 6"/></svg></span></div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
