<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PicTrip · 로그인</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --bg: #FFFFFF; --inset: #F7F7F8; --ink: #171719; --sec: #5A5C63; --ter: #9396A0;
    --line: rgba(112,115,124,0.18); --fill: rgba(112,115,124,0.08);
    --kakao: #FEE500; --kakaoInk: #181600; --apple: #111113;
    --p: 'Pretendard', -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body { font-family: var(--p); background: #e4e5e8; display: flex; justify-content: center; padding: 40px 16px; color: var(--ink); }
  .phone { width: 402px; height: 874px; background: var(--bg); border-radius: 46px; box-shadow: 0 30px 80px rgba(16,14,18,0.28); overflow: hidden; position: relative; display: flex; flex-direction: column; }

  .statusbar { height: 54px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 28px 8px; font-size: 15px; font-weight: 600; flex-shrink: 0; }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .back { position: absolute; top: 58px; left: 10px; z-index: 5; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; color: var(--ink); }

  /* 브랜드 (무채색) */
  .brand { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0 36px; }
  .sym { width: 72px; height: 72px; border-radius: 20px; background: var(--ink); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; box-shadow: 0 12px 26px rgba(23,23,25,0.22); }
  .word { font-size: 28px; font-weight: 800; letter-spacing: -0.84px; color: var(--ink); }
  .copy { margin-top: 14px; font-size: 15px; line-height: 23px; color: var(--sec); text-align: center; }

  /* 소셜 버튼 (브랜드 색 유지) */
  .social { padding: 0 24px; display: flex; flex-direction: column; gap: 11px; }
  .sbtn { height: 54px; border-radius: 13px; display: flex; align-items: center; justify-content: center; position: relative; font-size: 16px; font-weight: 700; }
  .sbtn .si { position: absolute; left: 18px; display: flex; align-items: center; }
  .kakao { background: var(--kakao); color: var(--kakaoInk); }
  .google { background: var(--bg); border: 1px solid var(--line); color: var(--ink); }
  .apple { background: var(--apple); color: #fff; }

  .terms { text-align: center; font-size: 12px; line-height: 19px; color: var(--ter); padding: 18px 32px 0; }
  .terms b { color: var(--sec); font-weight: 600; }
  .pad { height: 40px; }
</style>
</head>
<body>
  <div class="phone">
    <div class="statusbar"><span>9:41</span><span class="icons">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="3" width="2.5" height="6" rx="1"/><rect x="4" y="1.5" width="2.5" height="7.5" rx="1"/><rect x="8" y="0" width="2.5" height="9" rx="1"/></svg>
      <svg width="24" height="12" viewBox="0 0 24 12" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="1" y="1.5" width="19" height="9" rx="2.5"/><rect x="2.5" y="3" width="14" height="6" rx="1" fill="currentColor"/><rect x="21" y="4" width="2" height="4" rx="1" fill="currentColor"/></svg>
    </span></div>

    <div class="back"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg></div>

    <!-- 브랜드 -->
    <div class="brand">
      <div class="sym">
        <svg width="46" height="46" viewBox="0 0 48 48" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="20" cy="10" r="3.6"/>
          <path d="M20 13.6 V28.5"/>
          <path d="M20 28.5 L15 40"/>
          <path d="M20 28.5 L25 40"/>
          <path d="M20 18 L26.5 15"/>
          <path d="M20 18.5 L15.5 24"/>
          <rect x="26" y="11.4" width="8" height="5.2" rx="1.6" fill="#fff" stroke="none"/>
          <circle cx="30" cy="14" r="1.3" fill="#171719"/>
        </svg>
      </div>
      <div class="word">PicTrip</div>
    </div>

    <!-- 소셜 -->
    <div class="social">
      <div class="sbtn kakao">
        <span class="si"><svg width="20" height="20" viewBox="0 0 24 24" fill="#181600"><path d="M12 3C6.9 3 2.8 6.2 2.8 10.2c0 2.6 1.8 4.9 4.4 6.2-.2.7-.7 2.5-.8 2.9 0 .2.1.4.4.2.2-.1 2.6-1.8 3.7-2.5.5.1 1 .1 1.5.1 5.1 0 9.2-3.2 9.2-7.2S17.1 3 12 3z"/></svg></span>
        카카오로 계속하기
      </div>
      <div class="sbtn google">
        <span class="si"><svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.5 12.2c0-.7-.06-1.4-.18-2.05H12v3.88h5.9a5.05 5.05 0 0 1-2.19 3.31v2.75h3.54c2.07-1.9 3.25-4.7 3.25-7.89Z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.54-2.75c-.98.66-2.23 1.05-3.74 1.05-2.87 0-5.3-1.94-6.17-4.55H2.18v2.84A11 11 0 0 0 12 23Z"/><path fill="#FBBC05" d="M5.83 14.09a6.6 6.6 0 0 1 0-4.18V7.07H2.18a11 11 0 0 0 0 9.86l3.65-2.84Z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.14-3.14C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.07l3.65 2.84C6.7 7.3 9.13 5.38 12 5.38Z"/></svg></span>
        Google로 계속하기
      </div>
      <div class="sbtn apple">
        <span class="si"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M16.4 12.8c0-2.2 1.8-3.3 1.9-3.4-1-1.5-2.6-1.7-3.2-1.7-1.4-.1-2.6.8-3.3.8-.7 0-1.7-.8-2.8-.8-1.5 0-2.8.8-3.6 2.2-1.5 2.7-.4 6.6 1.1 8.8.7 1 1.6 2.2 2.7 2.2 1.1 0 1.5-.7 2.8-.7s1.6.7 2.8.7c1.2 0 1.9-1.1 2.6-2.1.8-1.2 1.2-2.3 1.2-2.4-.1 0-2.3-.9-2.3-3.6zM14.3 6.1c.6-.7 1-1.7.9-2.7-.9 0-1.9.6-2.5 1.3-.5.6-1 1.6-.9 2.6 1 0 2-.5 2.5-1.2z"/></svg></span>
        Apple로 계속하기
      </div>
    </div>

    <div class="terms">계속 진행하면 <b>이용약관</b> 및 <b>개인정보처리방침</b>에<br />동의하는 것으로 간주돼요.</div>
    <div class="pad"></div>
  </div>
</body>
</html>
