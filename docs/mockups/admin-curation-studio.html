<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PicTrip Admin · 큐레이션 편집 (WYSIWYG)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  /* ── 기존 admin "Lumen" 토큰 미러 (admin.css) ── */
  :root {
    --bg:#f7f8fa; --surface:#ffffff; --surface-2:#f1f3f7;
    --ink:#0f172a; --ink-2:#475569; --ink-3:#94a3b8;
    --line:#e9edf3; --line-2:#eef1f6;
    --accent:#0d9488; --accent-soft:#d9f3ef; --accent-ink:#0b7a70;
    --ok:#16a34a; --ok-soft:#e7f6ec; --warn:#d97706; --warn-soft:#fdf0dd; --bad:#dc2626; --bad-soft:#fbe7e7;
    --mono:"JetBrains Mono", ui-monospace, monospace;
    --sans:"Pretendard","Plus Jakarta Sans", system-ui, sans-serif;
    --disp:"Plus Jakarta Sans","Pretendard", system-ui, sans-serif;
    --shadow:0 1px 2px rgba(15,23,42,.04), 0 4px 16px rgba(15,23,42,.05);
    --shadow-lg:0 10px 30px rgba(15,23,42,.10);
    --r:16px;
    /* 폰(앱) 토큰 — 무채색 에디토리얼 */
    --p-bg:#FFFFFF; --p-inset:#F7F7F8; --p-ink:#171719; --p-sec:#5A5C63; --p-ter:#9396A0;
    --p-line:rgba(112,115,124,0.18); --p-fill:rgba(112,115,124,0.10); --p-scrim:rgba(20,18,22,0.62);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg); color: var(--ink); font-family: var(--sans); font-size: 14px; line-height: 1.55; -webkit-font-smoothing: antialiased; overflow: auto; }
  button { font-family: inherit; cursor: pointer; }

  /* ── 셸 ── */
  .shell { display: grid; grid-template-columns: 76px 1fr; height: 100vh; min-width: 1150px; }

  /* 아이콘 사이드바 */
  .sidebar { background: var(--surface); border-right: 1px solid var(--line); padding: 16px 0; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .sb-logo { width: 38px; height: 38px; border-radius: 11px; background: #0f172a; color:#fff; display:grid; place-items:center; font-family:var(--disp); font-weight:800; font-size:18px; margin-bottom: 12px; }
  .nav-item { position: relative; width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center; color: var(--ink-3); transition: background .14s, color .14s; }
  .nav-item:hover { background: var(--surface-2); color: var(--ink-2); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent-ink); }
  .nav-item svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 1.8; }
  .nav-item .tip { position: absolute; left: 52px; top: 50%; transform: translateY(-50%) translateX(-4px); background: var(--ink); color: #fff; font-size: 11.5px; font-weight: 600; padding: 4px 9px; border-radius: 7px; white-space: nowrap; opacity: 0; pointer-events: none; transition: opacity .12s, transform .12s; z-index: 50; }
  .nav-item:hover .tip { opacity: 1; transform: translateY(-50%) translateX(0); }
  .nav-item .ndot { position: absolute; top: 9px; right: 9px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
  .sb-sep { width: 28px; height: 1px; background: var(--line); margin: 10px 0; }
  .sb-av { margin-top: auto; width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color:#fff; display:grid; place-items:center; font-weight:700; font-size:13px; }

  .main { display: flex; flex-direction: column; min-width: 0; height: 100vh; }
  .topbar { flex: none; background: rgba(247,248,250,.85); backdrop-filter: blur(8px); border-bottom: 1px solid var(--line); padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 13px; }
  .crumb { font-size: 12.5px; color: var(--ink-3); display: flex; align-items: center; gap: 8px; }
  .crumb b { color: var(--ink); font-weight: 700; }
  .topbar .spacer { flex: 1; }
  .savestate { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ink-2); font-weight: 600; }
  .savestate .d { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); }
  .savestate.dirty .d { background: var(--warn); }
  .env-pill { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink-2); background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 6px 12px; box-shadow: var(--shadow); }
  .env-pill b { color: var(--ink); }
  .btn { display: inline-flex; align-items: center; gap: 7px; height: 35px; padding: 0 13px; border-radius: 10px; border: 1px solid var(--line); background: var(--surface); color: var(--ink); font-size: 13px; font-weight: 600; box-shadow: var(--shadow); transition: background .14s, transform .05s; }
  .btn:hover { background: var(--surface-2); }
  .btn:active { transform: translateY(1px); }
  .btn .bi { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.9; flex: none; }
  .btn.ghost { box-shadow: none; border-color: transparent; background: transparent; color: var(--ink-2); }
  .btn.ghost:hover { background: var(--surface-2); color: var(--ink); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 14px rgba(13,148,136,.28); }
  .btn.primary:hover { background: var(--accent-ink); }

  .content { flex: 1; min-height: 0; padding: 16px 24px 18px; display: flex; flex-direction: column; }
  .page-head { display: flex; align-items: center; gap: 13px; margin-bottom: 13px; flex: none; }
  .page-head .eyebrow { font-family: var(--mono); font-size: 10.5px; letter-spacing: .14em; text-transform: uppercase; color: var(--accent-ink); margin-bottom: 4px; }
  .page-head h1 { font-family: var(--disp); font-size: 21px; font-weight: 800; letter-spacing: -.02em; margin: 0; }
  .page-head p { margin: 0; color: var(--ink-2); font-size: 12.5px; }

  /* ── 3분할 ── */
  .editor { flex: 1; min-height: 0; display: grid; grid-template-columns: 244px minmax(392px,1fr) 356px; gap: 16px; align-items: stretch; }
  .col { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .col-h { flex: none; padding: 13px 16px; border-bottom: 1px solid var(--line-2); display: flex; align-items: center; gap: 9px; min-height: 50px; }
  .col-h h2 { font-family: var(--disp); font-size: 14px; font-weight: 700; margin: 0; }
  .col-h .sub { font-size: 10.5px; color: var(--ink-3); margin-left: auto; font-family: var(--mono); }
  .col-b { flex: 1; min-height: 0; overflow-y: auto; }
  .col-b::-webkit-scrollbar { width: 9px; }
  .col-b::-webkit-scrollbar-thumb { background: #dfe3ea; border-radius: 9px; border: 2px solid var(--surface); }

  /* 좌측 리스트 */
  .col-list .col-b { padding: 9px; }
  .group-label { display: flex; align-items: center; gap: 8px; padding: 12px 8px 6px; font-size: 11px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--ink-3); }
  .group-label .gi { width: 14px; height: 14px; stroke: var(--ink-3); fill: none; stroke-width: 2; }
  .group-label .count { margin-left: auto; font-family: var(--mono); font-size: 10px; font-weight: 600; color: var(--ink-2); background: var(--surface-2); border-radius: 999px; padding: 1px 8px; letter-spacing: 0; }
  .slot { display: flex; align-items: center; gap: 10px; padding: 7px; border-radius: 12px; cursor: pointer; border: 1px solid transparent; transition: background .13s, border-color .13s; }
  .slot + .slot { margin-top: 2px; }
  .slot:hover { background: var(--surface-2); }
  .slot.active { background: var(--accent-soft); border-color: #bfe8e2; }
  .slot .grip { color: var(--ink-3); cursor: grab; flex: none; opacity: 0; transition: opacity .13s; display:grid; place-items:center; }
  .slot:hover .grip, .slot.active .grip { opacity: .9; }
  .slot .sthumb { width: 40px; height: 40px; border-radius: 9px; flex: none; object-fit: cover; background: var(--surface-2); border: 1px solid var(--line); }
  .slot .smeta { min-width: 0; flex: 1; }
  .slot .stitle { font-size: 12.5px; font-weight: 700; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot.active .stitle { color: var(--accent-ink); }
  .slot .ssub { font-size: 10.5px; color: var(--ink-3); margin-top: 1px; font-family: var(--mono); }
  .slot .status { width: 8px; height: 8px; border-radius: 50%; flex: none; }
  .slot .status.on { background: var(--ok); } .slot .status.off { background: var(--warn); }

  /* 중앙 미리보기 */
  .col-stage .col-b { display: flex; flex-direction: column; align-items: center; background: linear-gradient(180deg, #eef1f5, #e7eaf0); padding: 0; }
  .stage-bar { flex: none; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px; position: sticky; top: 0; z-index: 5; background: linear-gradient(180deg, #eef1f5 60%, rgba(238,241,245,0)); }
  .live-pill { display: inline-flex; align-items: center; gap: 8px; font-size: 11.5px; font-weight: 600; color: var(--ink-2); background: var(--surface); border: 1px solid var(--line); padding: 6px 12px 6px 10px; border-radius: 999px; box-shadow: var(--shadow); }
  .live-pill .pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 0 rgba(22,163,74,.5); animation: pulse 2s infinite; }
  @keyframes pulse { 70% { box-shadow: 0 0 0 6px rgba(22,163,74,0); } 100% { box-shadow: 0 0 0 0 rgba(22,163,74,0); } }
  .seg-toggle { display: inline-flex; background: var(--surface); border: 1px solid var(--line); border-radius: 999px; padding: 3px; box-shadow: var(--shadow); }
  .seg-toggle button { border: 0; background: transparent; color: var(--ink-3); font-size: 11.5px; font-weight: 700; padding: 5px 13px; border-radius: 999px; }
  .seg-toggle button.on { background: var(--accent-soft); color: var(--accent-ink); }
  .seg-toggle button.disabled { opacity: .4; cursor: not-allowed; }
  .phone-pad { flex: 1; width: 100%; display: flex; justify-content: center; padding: 2px 16px 30px; }
  .phone { width: 360px; align-self: flex-start; background: var(--p-bg); border-radius: 42px; box-shadow: 0 24px 56px rgba(15,23,42,.30), 0 0 0 9px #0f172a, 0 0 0 10px rgba(255,255,255,.06); overflow: hidden; position: relative; color: var(--p-ink); font-family: var(--sans); }
  .statusbar { height: 44px; display: flex; align-items: flex-end; justify-content: space-between; padding: 0 24px 6px; font-size: 13.5px; font-weight: 600; letter-spacing: -0.2px; background: var(--p-bg); }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }

  /* 홈 화면 */
  .topbar-app { background: var(--p-bg); padding: 10px 18px 9px; border-bottom: 1px solid var(--p-line); }
  .wordmark-app { font-weight: 800; font-size: 21px; letter-spacing: -0.6px; color: var(--p-ink); }
  .hero-track { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
  .hero-track::-webkit-scrollbar { display: none; }
  .hero { position: relative; flex: 0 0 100%; width: 360px; height: 282px; scroll-snap-align: start; display: flex; align-items: flex-end; background: var(--p-inset); cursor: pointer; }
  .hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 34%, var(--p-scrim) 100%); }
  .hero-cap { position: relative; padding: 20px; z-index: 1; }
  .hero-title { color: #fff; font-weight: 800; font-size: 28px; letter-spacing: -0.6px; line-height: 33px; white-space: pre-line; }
  .hero-sub { color: #fff; font-weight: 500; font-size: 14px; opacity: 0.95; margin-top: 7px; }
  .hero-tapcue { position: absolute; right: 16px; bottom: 20px; z-index: 1; display: flex; align-items: center; gap: 5px; color: #fff; background: rgba(20,18,22,.4); backdrop-filter: blur(6px); border:1px solid rgba(255,255,255,.22); border-radius: 999px; padding: 5px 10px; font-size: 10.5px; font-weight: 700; }
  .hero.is-draft { filter: grayscale(.45) brightness(.92); }
  .hero.is-draft .draft-tag { display: flex; }
  .draft-tag { display: none; position: absolute; top: 13px; left: 18px; z-index: 2; align-items: center; gap: 6px; background: rgba(20,18,22,.7); backdrop-filter: blur(6px); color: #fff; font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 999px; }
  .pagebar { display: flex; gap: 4px; }
  .seg { flex: 1; height: 3px; background: var(--p-line); transition: background .15s; }
  .seg.active { background: var(--p-ink); }
  .section { padding-top: 26px; cursor: pointer; }
  .section.sel-rail { background: linear-gradient(180deg, rgba(13,148,136,.05), transparent 60%); }
  .divider { height: 1px; background: var(--p-line); margin: 0 18px 18px; }
  .sec-title { font-weight: 800; font-size: 23px; letter-spacing: -0.5px; line-height: 29px; padding: 0 18px; white-space: pre-line; }
  .sec-sub { color: var(--p-ter); font-weight: 500; font-size: 14px; margin-top: 6px; padding: 0 18px; }
  .rail { display: flex; gap: 13px; padding: 14px 18px 0; overflow-x: auto; scrollbar-width: none; }
  .rail::-webkit-scrollbar { display: none; }
  .card { flex: 0 0 164px; }
  .card .thumb { width: 164px; height: 164px; border-radius: 14px; overflow: hidden; background: var(--p-inset); }
  .card .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card .nm { font-weight: 700; font-size: 16px; letter-spacing: -0.2px; margin-top: 9px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card .cat { color: var(--p-ter); font-weight: 500; font-size: 13.5px; margin-top: 2px; }
  .section.is-draft { opacity: .5; }
  .section.is-draft .sec-title::after { content: ' · 미발행'; color: var(--p-ter); font-size: 12px; font-weight: 600; }
  .tabbar { height: 76px; padding: 10px 14px 0; background: var(--p-bg); border-top: 1px solid var(--p-line); display: flex; justify-content: space-around; margin-top: 32px; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--p-ter); }
  .tab.active { color: var(--p-ink); }
  .tab .tlabel { font-size: 11px; font-weight: 600; }

  /* 상세 화면 (히어로 전용) */
  .dnav { display: flex; justify-content: space-between; align-items: center; padding: 5px 12px 0; }
  .nav-btn { width: 40px; height: 40px; border-radius: 20px; background: var(--p-fill); display: flex; align-items: center; justify-content: center; color: var(--p-sec); cursor: pointer; }
  .dtitle { color: var(--p-ink); font-size: 28px; font-weight: 800; letter-spacing: -0.6px; line-height: 37px; text-align: center; padding: 12px 22px 0; white-space: pre-line; }
  .dcover { aspect-ratio: 4/5; margin: 20px 18px 0; border-radius: 16px; overflow: hidden; background: var(--p-inset); }
  .dcover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .dlead { color: var(--p-ink); font-size: 17.5px; font-weight: 700; letter-spacing: -0.3px; text-align: center; margin: 26px 22px 0; }
  .dintro { color: var(--p-sec); font-size: 15px; line-height: 28px; text-align: center; margin: 14px 22px 0; white-space: pre-line; }
  .dchev { display: flex; justify-content: center; color: var(--p-ter); margin-top: 22px; }
  .dgrid { display: flex; flex-wrap: wrap; justify-content: space-between; row-gap: 20px; padding: 24px 18px 34px; }
  .gcard { width: 48.5%; }
  .gcard .gimg { width: 100%; aspect-ratio: 1; border-radius: 16px; overflow: hidden; background: var(--p-inset); }
  .gcard .gimg img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .gcard .gnm { color: var(--p-ink); font-size: 15px; font-weight: 700; letter-spacing: -0.2px; margin: 9px 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .gcard .gcat { color: var(--p-ter); font-size: 13px; font-weight: 500; margin: 2px 2px 0; }
  .dgrid-empty { width: 100%; text-align: center; color: var(--p-ter); font-size: 13px; padding: 20px; }

  /* 포커스 링 */
  .focus-ring { position: absolute; left: 6px; right: 6px; z-index: 30; pointer-events: none; border: 2px solid var(--accent); border-radius: 17px; box-shadow: 0 0 0 4px var(--accent-soft); opacity: 0; transition: opacity .18s, top .34s cubic-bezier(.2,.8,.2,1), height .34s cubic-bezier(.2,.8,.2,1); }
  .focus-ring.show { opacity: 1; }
  .focus-ring .tag { position: absolute; top: -12px; left: 12px; background: var(--accent); color: #fff; font-size: 10px; font-weight: 800; padding: 3px 8px; border-radius: 7px; white-space: nowrap; box-shadow: 0 4px 12px rgba(13,148,136,.3); }

  /* ── 우측 인스펙터 ── */
  .col-insp .col-h .tbadge { margin-left: auto; font-family: var(--mono); font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }
  .tbadge.hero { background: var(--accent-soft); color: var(--accent-ink); }
  .tbadge.rail { background: #eef2f9; color: #5b6b86; }
  .insp-ctx { display: flex; align-items: center; gap: 9px; padding: 11px 16px; border-bottom: 1px solid var(--line-2); background: var(--surface-2); }
  .insp-ctx img { width: 30px; height: 30px; border-radius: 7px; object-fit: cover; border: 1px solid var(--line); }
  .insp-ctx .nm { font-size: 12.5px; font-weight: 700; }
  .insp-ctx .pth { font-size: 10.5px; color: var(--ink-3); font-family: var(--mono); margin-top: 1px; }
  .col-insp .col-b { padding: 2px 16px 16px; }

  .kindnote { display: flex; gap: 9px; align-items: flex-start; margin: 13px 0 2px; padding: 11px 12px; border-radius: 11px; font-size: 11.5px; line-height: 1.55; }
  .kindnote.hero { background: var(--accent-soft); color: var(--accent-ink); }
  .kindnote.rail { background: #eff3f9; color: #51607a; }
  .kindnote b { font-weight: 700; }
  .kindnote svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.9; flex: none; margin-top: 1px; }

  .fgroup { padding: 16px 0 5px; border-bottom: 1px solid var(--line-2); }
  .fgroup:last-child { border-bottom: 0; }
  .fgroup.primary { background: linear-gradient(180deg, rgba(13,148,136,.04), transparent); margin: 0 -16px; padding: 16px 16px 8px; border-top: 1px solid var(--line-2); }
  .fg-label { display: flex; align-items: center; gap: 7px; margin-bottom: 12px; font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: var(--ink-3); }
  .fg-label svg { width: 13px; height: 13px; stroke: var(--accent-ink); fill: none; stroke-width: 2; flex: none; }
  .fg-label .tagn { margin-left: auto; font-family: var(--mono); font-size: 9.5px; font-weight: 600; color: var(--accent-ink); background: var(--accent-soft); padding: 1px 7px; border-radius: 999px; letter-spacing: 0; text-transform: none; }
  .field { margin-bottom: 13px; }
  .field:last-child { margin-bottom: 3px; }
  .field label { display: flex; align-items: center; font-size: 11.5px; color: var(--ink-2); font-weight: 600; margin-bottom: 6px; }
  .field label .counter { margin-left: auto; font-family: var(--mono); font-size: 10.5px; color: var(--ink-3); font-weight: 500; }
  .inp, .ta { width: 100%; font-family: var(--sans); font-size: 13px; color: var(--ink); background: var(--surface); border: 1px solid var(--line); border-radius: 11px; padding: 9px 11px; transition: box-shadow .12s, border-color .12s; }
  .inp:focus, .ta:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .inp::placeholder, .ta::placeholder { color: var(--ink-3); }
  .ta { resize: none; line-height: 1.5; }
  .ta.title, .inp.title { font-weight: 700; font-size: 14px; letter-spacing: -0.2px; }
  .hint { font-size: 11px; color: var(--ink-3); margin-top: 7px; line-height: 1.55; }
  .hint b { color: var(--ink-2); font-weight: 700; }

  /* 히어로: 카드형 표지 프리뷰 (편집 미러) */
  .cardprev { position: relative; border-radius: 13px; overflow: hidden; aspect-ratio: 16/10; background: var(--p-inset); border: 1px solid var(--line); margin-bottom: 12px; }
  .cardprev img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .cardprev::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 36%, rgba(20,18,22,.6) 100%); }
  .cardprev .cp-cap { position: absolute; left: 14px; right: 14px; bottom: 12px; z-index: 1; }
  .cardprev .cp-title { color:#fff; font-weight: 800; font-size: 18px; line-height: 21px; letter-spacing: -0.4px; white-space: pre-line; }
  .cardprev .cp-sub { color: rgba(255,255,255,.92); font-size: 11.5px; margin-top: 4px; }
  .cardprev .cp-change { position: absolute; top: 10px; right: 10px; z-index: 2; border: 0; background: rgba(255,255,255,.92); color: var(--ink); font-size: 11px; font-weight: 700; padding: 5px 10px; border-radius: 8px; box-shadow: var(--shadow); }

let dragSlot=null;
function wireSlotDrag(el){
  el.addEventListener('dragstart',e=>{dragSlot=el;el.style.opacity=.4;e.dataTransfer.effectAllowed='move';});
  el.addEventListener('dragend',()=>{el.style.opacity='';dragSlot=null;});
  el.addEventListener('dragover',e=>e.preventDefault());
  el.addEventListener('drop',e=>{e.preventDefault();if(!dragSlot||dragSlot.dataset.kind!==el.dataset.kind)return;const kind=el.dataset.kind,arr=kind==='hero'?state.heroes:state.rails,from=+dragSlot.dataset.idx,to=+el.dataset.idx;const[m]=arr.splice(from,1);arr.splice(to,0,m);if(sel.kind===kind&&sel.idx===from)sel.idx=to;markDirty();renderScreen();renderLists();renderInspector();toast('순서를 변경했습니다');});
}

function selectSlot(kind,idx){
  sel={kind,idx};

}
function setView(v){
  if(v==='detail'&&sel.kind!=='hero'){toast('무드 레일은 상세 화면이 없어요');return;}
  view=v;updateToggle();renderScreen();
  if(v==='home')scrollPreviewTo(sel.kind,sel.idx);
  else document.querySelector('.col-stage .col-b').scrollTo({top:0,behavior:'smooth'});
}
function updateToggle(){
  const isHero=sel.kind==='hero';
  document.querySelectorAll('#viewToggle button').forEach(b=>{
    b.classList.toggle('on',b.dataset.view===view);
    if(b.dataset.view==='detail')b.classList.toggle('disabled',!isHero);
  });
}

/* ════════ 손픽/스팟 리스트 ════════ */
function renderPicks(){
  const it=current();
  qs('pickCount').textContent=`${it.picks.length} / 8`;
  const list=qs('pickList');
  if(!it.picks.length){list.innerHTML=`<div class="empty-picks">${sel.kind==='hero'?'손픽이 비어 있어요.<br>지역 품질 랭킹으로 자동 편성됩니다.':'스팟이 비어 있어요.<br>무드 매칭으로 자동 편성됩니다.'}</div>`;return;}
  list.innerHTML=it.picks.map((p,i)=>`
    <div class="pick" data-i="${i}" draggable="true">
      <span class="grip"><svg width="9" height="15" viewBox="0 0 9 15" fill="currentColor"><circle cx="2" cy="2" r="1.4"/><circle cx="7" cy="2" r="1.4"/><circle cx="2" cy="7.5" r="1.4"/><circle cx="7" cy="7.5" r="1.4"/><circle cx="2" cy="13" r="1.4"/><circle cx="7" cy="13" r="1.4"/></svg></span>
      <span class="pnum">${i+1}</span><img src="${img(p.seed,80)}" alt=""/>
      <div class="pmeta"><div class="pname">${esc(p.name)}</div><div class="pcat">${esc(p.cat)}</div></div>
      <button class="px" data-rm="${i}"><svg viewBox="0 0 24 24" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>`).join('');
  list.querySelectorAll('.px').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();it.picks.splice(+b.dataset.rm,1);markDirty();renderPicks();renderScreen();renderLists();syncCtx();}));
  wirePickDrag(list);
}
let dragPick=null;
function wirePickDrag(list){
  list.querySelectorAll('.pick').forEach(el=>{
    el.addEventListener('dragstart',e=>{dragPick=el;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');list.querySelectorAll('.pick').forEach(p=>p.classList.remove('drag-over'));dragPick=null;});
    el.addEventListener('dragover',e=>{e.preventDefault();if(dragPick&&dragPick!==el)el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{e.preventDefault();if(!dragPick||dragPick===el)return;const it=current(),from=+dragPick.dataset.i,to=+el.dataset.i;const[m]=it.picks.splice(from,1);it.picks.splice(to,0,m);markDirty();renderPicks();renderScreen();renderLists();});
  });
}
function syncCtx(){ const it=current(); if(sel.kind==='rail') qs('inspName').textContent=`${it.picks.length}개 스팟`; }

/* ════════ 인스펙터 이벤트 ════════ */
function bindInspector(isHero){
  ['fTitle','fSub','fLead','fIntro'].forEach(id=>{ const el=qs(id); if(!el)return;
    const key={fTitle:'title',fSub:'subtitle',fLead:'lead',fIntro:'intro'}[id];
    el.value=current()[key]||'';
    el.addEventListener('input',e=>{current()[key]=e.target.value;markDirty();updateCounters();
      if(isHero&&id==='fTitle'&&qs('cpTitle'))qs('cpTitle').textContent=e.target.value;
      if(isHero&&id==='fSub'&&qs('cpSub'))qs('cpSub').textContent=e.target.value;
      renderScreen();});
  });
  updateCounters();
  qs('pubSwitch').addEventListener('click',()=>{const it=current();it.published=!it.published;markDirty();qs('pubSwitch').classList.toggle('on',it.published);qs('pubSub').textContent=it.published?'홈 피드에 노출됩니다':'홈 피드에서 숨겨집니다';qs('saveBtn').textContent=it.published?'저장 후 발행':'초안 저장';renderScreen();renderLists();toast(it.published?'발행 상태로 전환':'미발행으로 전환');});
  qs('posUp').addEventListener('click',()=>movePos(1));
  qs('posDown').addEventListener('click',()=>movePos(-1));
  qs('addPick').addEventListener('click',()=>{const it=current();if(it.picks.length>=8){toast('최대 8개까지 가능합니다');return;}const n=it.picks.length+1;it.picks.push({name:`새 스팟 ${n}`,cat:'관광지',seed:`${it.id}-new-${n}-${Math.floor(performance.now())}`});markDirty();renderPicks();renderScreen();renderLists();syncCtx();});
  qs('previewDetail')?.addEventListener('click',()=>setView('detail'));
  document.querySelectorAll('#moodChips .mchip').forEach(b=>b.addEventListener('click',()=>{current().mood=b.dataset.mood;document.querySelectorAll('#moodChips .mchip').forEach(x=>x.classList.toggle('on',x===b));markDirty();toast(`무드: ${b.dataset.mood}`);}));
  document.querySelector('.cp-change')?.addEventListener('click',()=>toast('표지 스팟 선택 (스팟 피커 모달)'));
}
function movePos(d){const kind=sel.kind,arr=kind==='hero'?state.heroes:state.rails,to=sel.idx+d;if(to<0||to>=arr.length)return;const[m]=arr.splice(sel.idx,1);arr.splice(to,0,m);sel.idx=to;markDirty();renderScreen();renderLists();renderInspector();updateToggle();if(view==='home')scrollPreviewTo(kind,to);}

/* ════════ 포커스 링 / 스크롤 ════════ */
function scrollPreviewTo(kind,idx){
  if(view!=='home')return;
  const scroll=document.querySelector('.col-stage .col-b');
  if(kind==='hero'){const track=qs('heroTrack');const hero=track?.children[idx];if(hero)track.scrollTo({left:hero.offsetLeft,behavior:'smooth'});scroll.scrollTo({top:0,behavior:'smooth'});}
  else{const sec=qs('railSections')?.children[idx];if(sec)scroll.scrollTo({top:Math.max(0,sec.offsetTop+qs('phoneBody').offsetTop-100),behavior:'smooth'});}
  setTimeout(positionFocusRing,360);
}
function positionFocusRing(){
  const ring=qs('focusRing');
  if(view!=='home'){ring.classList.remove('show');return;}
  let target=sel.kind==='hero'?document.querySelector('.hero[data-idx="'+sel.idx+'"]'):document.querySelector('.section[data-idx="'+sel.idx+'"]');
  if(!target){ring.classList.remove('show');return;}
  const phone=qs('phone'),pr=phone.getBoundingClientRect(),tr=target.getBoundingClientRect();
  let top=tr.top-pr.top,height=tr.height;
  if(top<0){height+=top;top=0;}
  if(top+height>pr.height)height=pr.height-top;
  if(height<24){ring.classList.remove('show');return;}
  ring.style.top=top+'px';ring.style.height=height+'px';ring.querySelector('.tag').textContent=sel.kind==='hero'?'편집 중 · 히어로':'편집 중 · 레일';ring.classList.add('show');
}
document.querySelector('.col-stage .col-b').addEventListener('scroll',positionFocusRing,{passive:true});
window.addEventListener('resize',positionFocusRing);

/* ════════ 유틸 ════════ */
function updateCounters(){[['fTitle','cTitle'],['fSub','cSub'],['fLead','cLead'],['fIntro','cIntro']].forEach(([a,b])=>{const ea=qs(a),eb=qs(b);if(ea&&eb)eb.textContent=(ea.value||'').length;});}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function markDirty(){dirty=true;qs('saveState').classList.add('dirty');document.querySelector('#saveState .txt').textContent='편집 중';}
function clearDirty(){dirty=false;qs('saveState').classList.remove('dirty');document.querySelector('#saveState .txt').textContent='저장됨 · 방금';}
let toastTimer;
function toast(msg){const t=qs('toast');qs('toastMsg').textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);}

/* 전역 버튼 */
qs('saveBtn').addEventListener('click',()=>{clearDirty();toast('저장되었습니다');});
qs('toDraft').addEventListener('click',()=>{const it=current();it.published=false;markDirty();renderInspector();renderScreen();renderLists();toast('초안으로 저장');});
qs('publishAll').addEventListener('click',()=>{clearDirty();toast('모든 변경사항을 발행했습니다');});
qs('refreshBtn').addEventListener('click',()=>{renderScreen();toast('미리보기를 새로고침했습니다');});
document.querySelectorAll('#viewToggle button').forEach(b=>b.addEventListener('click',()=>{ if(b.classList.contains('disabled')){toast('무드 레일은 상세 화면이 없어요');return;} setView(b.dataset.view);}));

/* 부팅 */
renderScreen();renderLists();renderInspector();updateToggle();
setTimeout(positionFocusRing,200);
</script>
</body>
</html>
