<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PicTrip · 시작(스플래시)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root {
    --pretendard: 'Pretendard', -apple-system, system-ui, sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  body {
    font-family: var(--pretendard);
    background: #e6e7ea;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  /* 폰 프레임 */
  .phone {
    width: 402px;
    height: 874px;
    background: #000;
    border-radius: 46px;
    box-shadow: 0 30px 80px rgba(20, 18, 22, 0.28);
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    color: #fff;
  }

  /* 상태바 (흰색) */
  .statusbar {
    height: 54px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 28px 8px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
    flex-shrink: 0;
  }
  .statusbar .icons { display: flex; gap: 6px; align-items: center; }
  .statusbar .icons svg { display: block; }

  /* 중앙 로고 */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  .splashfig { stroke: #fff; fill: none; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
  .splashfig .solid { fill: #fff; stroke: none; }
  .logo {
    font-family: var(--pretendard);
    font-weight: 800;
    font-size: 38px;
    letter-spacing: -1px;
    color: #fff;
  }

  /* 홈 인디케이터 */
  .home-indicator {
    position: absolute;
    bottom: 9px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 3px;
    background: #fff;
  }
</style>
</head>
<body>
  <div class="phone">
    <!-- 상태바 -->
    <div class="statusbar">
      <span>10:48</span>
      <span class="icons">
        <svg width="18" height="12" viewBox="0 0 18 12" fill="#fff"><rect x="0" y="3" width="2.5" height="6" rx="1"/><rect x="4" y="1.5" width="2.5" height="7.5" rx="1"/><rect x="8" y="0" width="2.5" height="9" rx="1"/><rect x="12" y="0" width="2.5" height="9" rx="1"/></svg>
        <span style="font-size:12px;font-weight:700;letter-spacing:0;">LTE</span>
        <svg width="26" height="13" viewBox="0 0 26 13" fill="none"><rect x="1" y="1.5" width="20" height="10" rx="2.8" stroke="#fff" stroke-width="1.2"/><rect x="2.6" y="3.1" width="16.8" height="6.8" rx="1.4" fill="#fff"/><rect x="22.5" y="4.3" width="2" height="4.4" rx="1" fill="#fff"/></svg>
      </span>
    </div>

    <!-- 중앙 로고 (셀카 캐릭터 + 워드마크) -->
    <div class="center">
      <svg class="splashfig" width="92" height="92" viewBox="0 0 48 48">
        <circle cx="20" cy="10" r="3.6"/>
        <path d="M20 13.6 V28.5"/>
        <path d="M20 28.5 L15 40"/>
        <path d="M20 28.5 L25 40"/>
        <path d="M20 18 L26.5 15"/>
        <path d="M20 18.5 L15.5 24"/>
        <rect class="solid" x="26" y="11.4" width="8" height="5.2" rx="1.6"/>
        <circle cx="30" cy="14" r="1.3" fill="#000"/>
      </svg>
      <div class="logo">PicTrip</div>
    </div>

    <!-- 홈 인디케이터 -->
    <div class="home-indicator"></div>
  </div>
</body>
</html>
