# CT113 pictrip-mon — observability stack (S12). Phase 1-2 first; Loki/Alloy = Phase 3.
services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules:/etc/prometheus/alert-rules:ro
      - promdata:/prometheus
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=30d"]
    ports: ["9090:9090"]
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    volumes: ["grafanadata:/var/lib/grafana", "./grafana:/etc/grafana/provisioning:ro"]
    ports: ["3000:3000"]
  uptime-kuma:
    image: louislam/uptime-kuma:1
    restart: unless-stopped
    volumes: ["kumadata:/app/data"]
    ports: ["3001:3001"]
  # Phase 3 (after deadline): loki + alloy
volumes:
  promdata:
  grafanadata:
  kumadata:
