# CT112 runtime compose (api + redis). Image tag from .deploy.env.
# The Cloudflare tunnel (api.pictrip.org -> localhost:8000) is run host-side on
# CT112 (`cloudflared --config /etc/cloudflared/config.yml run`, tunnel
# ac767e37-...), NOT in this stack. A prior in-compose `cloudflared` service ran
# `tunnel run` with no tunnel name/creds and only crash-looped while the host
# process served traffic — removed to match reality.
services:
  api:
    image: ${IMAGE}:${IMAGE_TAG}
    restart: unless-stopped
    ports: ["8000:8000"]
    volumes:
      - /opt/pictrip-api/.env:/app/.env:ro   # immutable secrets
    depends_on: [redis]
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >-
      redis-server --save 60 1 --appendonly yes --appendfsync everysec
      --maxmemory 256mb --maxmemory-policy noeviction --loglevel warning
    volumes: ["redisdata:/data"]
volumes:
  redisdata:
